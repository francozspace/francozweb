<script>

var time_old;
var striscio_attivo=false;
var scorri_attivo=false;

var scorri_timeout;
var num_img=30;
var num_div=5; //se più di 5 occorre mett più div

}

var arr_didascalie=[];
arr_didascalie[0]='Bouganville';
arr_didascalie[1]='Tulipano';
arr_didascalie[2]='Ciliegio';
arr_didascalie[3]='Viola';
arr_didascalie[4]='Loto';
arr_didascalie[5]='Margherita';
arr_didascalie[6]='Rosa';
arr_didascalie[7]='Orchidea';
arr_didascalie[8]='Calle';
arr_didascalie[9]='Iris';
arr_didascalie[10]='Mandorlo';
arr_didascalie[11]='Pesco';
arr_didascalie[12]='Fresia';

arr_didascalie[29]='Anthurium';


init=function() {
//divspan=document.getElementById('span1');


divcont=document.getElementById('divcont');
divcont.style.width=largh_div_cont+'px';
divcont.style.height=alt_div_cont+'px';
divcont.ondragstart=function() {return false;}
div[0]=document.getElementById('div0');
div[1]=document.getElementById('div1');
div[2]=document.getElementById('div2');
div[3]=document.getElementById('div3');
div[4]=document.getElementById('div4');
for (var i=0; i<num_div; i++){
div[i].style.height=alt_div+'px';
div[i].style.width=largh_div+'px';
asc[i]=i*largh_div;
div[i].style.left=asc[i]+'px';
div[i].style.top=parseInt((alt_div_cont-alt_div)/2)+'px';
}
imma[0]=document.getElementById('imm0');
imma[0].src=arr_img[0].src;
imma[1]=document.getElementById('imm1');
imma[1].src=arr_img[1].src;
imma[2]=document.getElementById('imm2');
imma[2].src=arr_img[2].src;
imma[3]=document.getElementById('imm3');
imma[3].src=arr_img[3].src;
imma[4]=document.getElementById('imm4');
imma[4].src=arr_img[4].src;
divcont.addEventListener("pointermove", handler_pointer_move);
divcont.addEventListener("pointerup", handler_pointer_up);
divcont.addEventListener("pointerdown", handler_pointer_down);

div_ingr=document.getElementById('div_overlay');
div_ingr.style.width='100%';
div_ingr.style.height='80%';
div_ingr.style.top='50px';

span_nascondi_overlay=document.getElementById('span_overlay');
span_nascondi_overlay.addEventListener("click", nascondi_overlay);

} 

nascondi_overlay=()=>{
div_ingr.style.display='none';
}

aggiorna_div=function(s) {
var l_temp=largh_div_cont;
var n_temp=(l_temp-largh_div-asc[primo_div_vis])/largh_div;
var ultima_img_vis=prima_img_vis+Math.ceil(n_temp);
var ultimo_div_vis=Math.ceil(primo_div_vis+n_temp);
if (ultimo_div_vis>=num_div) {
   ultimo_div_vis-=num_div;
}
if (prima_img_vis==0 && (asc[primo_div_vis]+Math.round(s))>0) {
s=-asc[primo_div_vis];
}
if (ultima_img_vis==(num_img-1) && (asc[ultimo_div_vis]+Math.round(s))<(largh_div_cont-largh_div)) {
s=-asc[ultimo_div_vis]+(largh_div_cont-largh_div);
}

for (var i=0; i<num_div; i++) {
asc[i]+=Math.round(s);
if (s<0 && asc[i]<=-largh_div){
asc[i]+=num_div*largh_div;
primo_div_vis+=1;
if (primo_div_vis==num_div) primo_div_vis=0;
prima_img_vis+=1;
var m_temp=prima_img_vis+num_div-1;
if (m_temp<num_img) {
imma[i].src=arr_img[m_temp].src;
}
}
if (s>0 && asc[i]>(num_div-1)*largh_div) {
asc[i]-=num_div*largh_div;
primo_div_vis-=1;
if (primo_div_vis<0) primo_div_vis=num_div-1;
prima_img_vis-=1;
imma[i].src=arr_img[prima_img_vis].src;
}
}
for (var i=0; i<num_div; i++) {
div[i].style.left=asc[i]+'px';
}
}

scorri=function (vel, dt) {
aggiorna_div(vel*dt);
if (!scorri_attivo && Math.abs(vel)>2.4) {
scorri_attivo=true;
}
if (scorri_attivo) {
var vel_temp=Math.abs(vel);
vel_temp-=0.05;
if (vel_temp<=0) {
scorri_attivo=false;
return;
}
vel_temp=vel_temp/vel*Math.abs(vel);
scorri_timeout=setTimeout (scorri, 15, vel_temp, 15);
}
}

function handler_pointer_move(event) {
var IdPuntatore=event.pointerId;
//Questa serve per i browser dei PC!
divcont.releasePointerCapture(IdPuntatore); 

if (!striscio_attivo) {
cursore_old=event.clientX;
time_old=event.timeStamp;
striscio_attivo=true;
click_abilitato=false;
}else {
var delta_x=event.clientX-cursore_old;
cursore_old=event.clientX;
var delta_t=event.timeStamp-time_old;
time_old=event.timeStamp;
var velocita=delta_x/delta_t;
if (!scorri_attivo) {
scorri(velocita, delta_t);
}
}
}
function handler_pointer_down(event) {
if (scorri_attivo) {
clearTimeout(scorri_timeout);
scorri_attivo=false;
click_abilitato=false;
}
}
function handler_pointer_up(e) {
striscio_attivo=false;
if (click_abilitato) {
var elem_cliccato=e.target;
if (elem_cliccato.id.slice(0, 3)=='imm') {
var obj=document.getElementById('img_overlay');
obj.src=elem_cliccato.src;
var corr=parseInt(elem_cliccato.id.slice(3,4));
if (corr>=primo_div_vis) {
corr=prima_img_vis+corr-primo_div_vis;
}
else {
corr=prima_img_vis+num_div-primo_div_vis+corr;
}
var obj=document.getElementById('span_didasc');
obj.innerHTML=arr_didascalie[corr];
div_ingr.style.display='flex';
}
}
click_abilitato=true;
}
window.addEventListener('DOMContentLoaded', init);
</script>
